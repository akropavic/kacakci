name: Stream Scraper

on:
  schedule:
    - cron: '0 10,20 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Node.js Kur
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Bagımlılıkları Kur
        run: npm install

      - name: Scripti Calistir
        run: node stream_finder.js

      - name: JSONu Repoya Kaydet
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add stream_links.json
          git commit -m "Guncellendi" || echo "Degisiklik yok"
          git push
